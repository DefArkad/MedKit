<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Личный кабинет</title>
    <script src="../static/js/profile.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white flex items-center justify-center min-h-screen p-4">
    <div class="bg-slate-800 p-8 rounded-xl shadow-2xl w-full max-w-md text-center">
        <h1 class="text-3xl font-bold mb-4">Добро пожаловать!</h1>
        <p class="text-slate-400 mb-6">Это твой защищенный профиль.</p>
        
        <!-- Информация о пользователе -->
        <div id="user-info" class="bg-slate-700 p-4 rounded-lg mb-6 hidden">
            <p class="text-sm text-slate-300">Твой ID: <span id="user-id" class="text-blue-400"></span></p>
            <p class="text-sm text-slate-300">Логин: <span id="user-name" class="text-blue-400"></span></p>
            <p id="role-container" class="text-sm text-slate-300 hidden">Роль: <span id="user-role" class="text-green-400 font-bold"></span></p>
        </div>

        <div class="flex flex-col gap-3">
            <button onclick="getMyPrescriptions()" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 rounded-lg transition">
                Мои активные рецепты
            </button>
            <button onclick="getAdminPanelInfo()" class="bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-2 rounded-lg transition">
                Админ панель
            </button>
            <button id="add-med-btn" onclick="addMedicationPrompt()" class="bg-amber-600 hover:bg-amber-700 text-white px-6 py-2 rounded-lg transition hidden">
                Добавить лекарство
            </button>
            <button id="create-prescription-btn" onclick="createPrescriptionPrompt()" class="bg-violet-600 hover:bg-violet-700 text-white px-6 py-2 rounded-lg transition hidden">
                Создать рецепт
            </button>
            <button id="add-pharmacy-btn" onclick="addPharmacyPrompt()" class="bg-cyan-600 hover:bg-cyan-700 text-white px-6 py-2 rounded-lg transition hidden">
                Добавить аптеку
            </button>
            <button id="change-role-btn" onclick="changeRolePrompt()" class="bg-emerald-600 hover:bg-emerald-700 text-white px-6 py-2 rounded-lg transition hidden">
                Изменить роль пользователя
            </button>
            <button onclick="logout()" class="bg-red-500 hover:bg-red-600 text-white px-6 py-2 rounded-lg transition mt-2">
                Выйти из системы
            </button>
        </div>

        <div id="prescriptions-container" class="mt-8 text-left hidden border-t border-slate-700 pt-4">
            <h2 class="text-xl font-bold mb-3">Мои рецепты:</h2>
            <ul id="prescriptions-list" class="space-y-3 max-h-80 overflow-y-auto pr-2"></ul>
        </div>
    </div>

    <!-- Окно чата -->
    <div id="chat-window" class="fixed bottom-5 right-5 w-80 bg-slate-800 border border-slate-700 rounded-xl shadow-2xl hidden flex flex-col z-50">
        <div class="bg-blue-600 p-3 rounded-t-xl font-bold flex justify-between items-center">
            <span>Поддержка</span>
            <button onclick="toggleChat()" class="text-xs">✖</button>
        </div>
        
        <!-- Селектор для Админа -->
        <div id="admin-target-selector" class="p-2 bg-slate-700 hidden">
            <input id="target-user-id" type="number" placeholder="ID пользователя для ответа" class="w-full bg-slate-900 text-xs p-1 rounded outline-none border border-slate-600">
        </div>

        <div id="chat-messages" class="h-64 overflow-y-auto p-4 space-y-2 text-sm"></div>
        
        <div class="p-3 border-t border-slate-700 flex gap-2">
            <input id="chat-input" type="text" class="bg-slate-900 border border-slate-600 rounded px-2 py-1 w-full text-sm outline-none" placeholder="Сообщение...">
            <button onclick="sendChatMessage()" class="bg-blue-600 px-3 py-1 rounded text-sm hover:bg-blue-700 transition">-></button>
        </div>
    </div>

    <!-- Кнопка вызова чата[cite: 4] -->
    <button onclick="toggleChat()" class="fixed bottom-5 right-5 bg-blue-600 p-4 rounded-full shadow-lg z-40 hover:bg-blue-700 transition">💬</button>

<script>
    const API_BASE_URL = 'http://127.0.0.1:8000'; //[cite: 4]

    // Логика управления кнопками
    document.getElementById('add-med-btn').classList.remove('hidden');
    document.getElementById('create-prescription-btn').classList.remove('hidden');
    document.getElementById('add-pharmacy-btn').classList.remove('hidden');

    // --- Функции рецептов и аптек ---
    async function addMedicationPrompt() {
        const name = prompt("Название лекарства:");
        if (!name) return;
        const description = prompt("Описание:");
        const prescription_required = confirm("Нужен рецепт?");
        const token = localStorage.getItem('token');
        try {
            const response = await fetch(`${API_BASE_URL}/home/add-medications`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                body: JSON.stringify({ name, description, prescription_required })
            });
            if (response.ok) alert("Готово!");
        } catch (e) { console.error(e); }
    }

    async function createPrescriptionPrompt() {
        const patient_id = prompt("ID пациента:");
        const pharmacy_id = prompt("ID аптеки:");
        const medication_id = prompt("ID лекарства:");
        const quantity = prompt("Количество:");
        const end_date = prompt("До (ГГГГ-ММ-ДД ТТ:ММ):", "2026-12-31 23:59");
        if (!patient_id || !pharmacy_id || !medication_id || !quantity || !end_date) return;
        const token = localStorage.getItem('token');
        try {
            await fetch(`${API_BASE_URL}/home/new_drug_prescription`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                body: JSON.stringify({
                    patient_id: parseInt(patient_id),
                    pharmacy_id: parseInt(pharmacy_id),
                    medication_id: parseInt(medication_id),
                    quantity: parseInt(quantity),
                    end_date: end_date.replace(' ', 'T')
                })
            });
        } catch (e) { console.error(e); }
    }

    async function getMyPrescriptions() {
        const token = localStorage.getItem('token');
        try {
            const response = await fetch(`${API_BASE_URL}/home/my_prescriptions`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            if (response.ok) {
                const data = await response.json();
                const list = document.getElementById('prescriptions-list');
                list.innerHTML = data.map(p => `
                    <li class="bg-slate-700 p-3 rounded-lg text-sm shadow border-l-4 border-green-500 mb-2">
                        <p class="text-green-400 font-bold">${p.medication_name} (${p.quantity} шт.)</p>
                        <p class="text-slate-300">Аптека: ${p.pharmacy_name}</p>
                    </li>`).join('');
                document.getElementById('prescriptions-container').classList.remove('hidden');
            }
        } catch (e) { console.error(e); }
    }

    // --- Логика чата[cite: 4] ---
// --- Логика чата ---
    let currentChatInterval = null;
    let currentUserData = null; // Сохраняем данные пользователя здесь, а не в HTML

    // Надежная функция: берем данные напрямую с сервера
    async function initChatUser() {
        if (currentUserData) return currentUserData; // Если уже загрузили, отдаем сразу
        
        const token = localStorage.getItem('token');
        try {
            const response = await fetch(`${API_BASE_URL}/users/me`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            if (response.ok) {
                currentUserData = await response.json();
                return currentUserData;
            }
        } catch (e) {
            console.error("Ошибка получения данных пользователя:", e);
        }
        return null;
    }

    async function toggleChat() {
        const chat = document.getElementById('chat-window');
        const isHidden = chat.classList.toggle('hidden');
        
        if (!isHidden) {
            // При открытии чата 100% получаем ID и роль с бэкенда
            const user = await initChatUser();
            
            if (user && user.role === "Admin") {
                document.getElementById('admin-target-selector').classList.remove('hidden');
            }
            startChatPolling();
        } else if (currentChatInterval) {
            clearInterval(currentChatInterval);
        }
    }

    async function sendChatMessage() {
        const input = document.getElementById('chat-input');
        const targetInput = document.getElementById('target-user-id');
        const text = input.value.trim();
        if (!text) return;

        const token = localStorage.getItem('token');
        const user = await initChatUser();
        
        if (!user) {
            alert("Не удалось получить ваш ID. Перезагрузите страницу.");
            return;
        }

        const target_user_id = user.role === "Admin" ? parseInt(targetInput.value) : null;

        try {
            const response = await fetch(`${API_BASE_URL}/home/chat/send`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                body: JSON.stringify({ text: text, target_user_id: target_user_id })
            });
            if (response.ok) {
                input.value = '';
                loadHistory();
            } else {
                console.error("Ошибка сервера:", await response.text());
            }
        } catch (e) { console.error("Ошибка отправки:", e); }
    }

    async function loadHistory() {
        const token = localStorage.getItem('token');
        const user = await initChatUser();
        
        if (!user || !user.id) {
            console.warn("Ожидание авторизации...");
            return;
        }

        const myId = user.id;
        let targetId = myId; // Обычный пользователь грузит свой чат

        // Если это админ, грузим чат того ID, который он ввел
        if (user.role === "Admin") {
            const adminInputTarget = parseInt(document.getElementById('target-user-id').value);
            if (isNaN(adminInputTarget)) return; // Если админ ничего не ввел — ничего не грузим
            targetId = adminInputTarget;
        }

        try {
            const response = await fetch(`${API_BASE_URL}/home/chat/history/${targetId}`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            if (response.ok) {
                const messages = await response.json();
                const container = document.getElementById('chat-messages');
                
                const newHTML = messages.map(m => `
                    <div class="p-2 rounded ${m.sender_id === myId ? 'bg-blue-900/50 text-right ml-8' : 'bg-slate-700 mr-8'} mb-2">
                        <p class="text-[10px] text-slate-400 mb-1">${m.sender_id === myId ? 'Вы' : (user.role === 'Admin' ? 'Пациент' : 'Сотрудник')}</p>
                        ${m.message}
                    </div>`).join('');
                
                if (container.innerHTML !== newHTML) {
                    container.innerHTML = newHTML;
                    container.scrollTop = container.scrollHeight;
                }
            }
        } catch (e) { console.error("Ошибка загрузки истории:", e); }
    }

    function startChatPolling() {
        if (currentChatInterval) clearInterval(currentChatInterval);
        loadHistory();
        currentChatInterval = setInterval(loadHistory, 3000);
    }
</script>
</body>
</html>
