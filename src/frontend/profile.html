<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Личный кабинет</title>
    <script src="../static/js/profile.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white flex items-center justify-center h-screen">
    <div class="bg-slate-800 p-8 rounded-xl shadow-2xl w-full max-w-md text-center">
        <h1 class="text-3xl font-bold mb-4">Добро пожаловать!</h1>
        <p class="text-slate-400 mb-6">Это твой защищенный профиль.</p>
        
        <div id="user-info" class="bg-slate-700 p-4 rounded-lg mb-6 hidden">
            <p class="text-sm text-slate-300">Твой ID: <span id="user-id" class="text-blue-400"></span></p>
            <p class="text-sm text-slate-300">Логин: <span id="user-name" class="text-blue-400"></span></p>
            <p id="role-container" class="text-sm text-slate-300 hidden">Роль: <span id="user-role" class="text-green-400 font-bold"></span></p>
        </div>

        <div class="flex flex-col gap-3">
            <button onclick="getAdminPanelInfo()" class="bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-2 rounded-lg transition">
                Админ панель
            </button>

            <button id="change-role-btn" onclick="changeRolePrompt()" class="bg-emerald-600 hover:bg-emerald-700 text-white px-6 py-2 rounded-lg transition hidden">
                Изменить роль пользователя
            </button>

            <button onclick="logout()" class="bg-red-500 hover:bg-red-600 text-white px-6 py-2 rounded-lg transition">
                Выйти из системы
            </button>
            <button id="add-med-btn" onclick="addMedicationPrompt()" class="bg-amber-600 hover:bg-amber-700 text-white px-6 py-2 rounded-lg transition hidden">
    Добавить лекарство
</button>

<script>
    // Добавьте это в функцию getAdminPanelInfo() внутри if (response.ok)
    // Чтобы кнопка появлялась только у тех, у кого есть доступ к админ-панели/роли Доктора
    document.getElementById('add-med-btn').classList.remove('hidden');

    async function addMedicationPrompt() {
        const name = prompt("Введите название лекарства:");
        if (!name) return;

        const description = prompt("Введите описание:");
        const prescription_q = confirm("Требуется ли рецепт?");

        const token = localStorage.getItem('token');
        
        try {
            const response = await fetch('http://127.0.0.1:8000/home/add-medications', {
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}` 
                },
                body: JSON.stringify({
                    name: name,
                    description: description,
                    prescription: prescription_q // Убедитесь, что имя поля совпадает с вашей схемой
                })
            });

            if (response.ok) {
                alert("Лекарство успешно добавлено!");
            } else {
                const errorData = await response.json();
                alert("Ошибка: " + (errorData.detail || "Не удалось добавить"));
            }
        } catch (error) {
            console.error("Ошибка запроса:", error);
            alert("Ошибка соединения с сервером");
        }
    }
</script>
        </div>
    </div>
</body>
</html>
