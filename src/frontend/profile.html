<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Личный кабинет</title>
    <script src="../static/js/profile.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white flex items-center justify-center h-screen">
    <div class="bg-slate-800 p-8 rounded-xl shadow-2xl w-full max-w-md text-center">
        <h1 class="text-3xl font-bold mb-4">Добро пожаловать!</h1>
        <p class="text-slate-400 mb-6">Это твой защищенный профиль.</p>
        
        <div id="user-info" class="bg-slate-700 p-4 rounded-lg mb-6 hidden">
            <p class="text-sm text-slate-300">Твой ID: <span id="user-id" class="text-blue-400"></span></p>
            <p class="text-sm text-slate-300">Логин: <span id="user-name" class="text-blue-400"></span></p>
            <p id="role-container" class="text-sm text-slate-300 hidden">Роль: <span id="user-role" class="text-green-400 font-bold"></span></p>
        </div>

        <div class="flex flex-col gap-3">
            <button onclick="getAdminPanelInfo()" class="bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-2 rounded-lg transition">
                Админ панель
            </button>
            <button onclick="getMyPrescriptions()" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 rounded-lg transition">
                Мои активные рецепты
            </button>

            <button id="change-role-btn" onclick="changeRolePrompt()" class="bg-emerald-600 hover:bg-emerald-700 text-white px-6 py-2 rounded-lg transition hidden">
                Изменить роль пользователя
            </button>

            <button onclick="logout()" class="bg-red-500 hover:bg-red-600 text-white px-6 py-2 rounded-lg transition">
                Выйти из системы
            </button>
            <button id="add-med-btn" onclick="addMedicationPrompt()" class="bg-amber-600 hover:bg-amber-700 text-white px-6 py-2 rounded-lg transition hidden">
    Добавить лекарство
</button>
<button id="create-prescription-btn" onclick="createPrescriptionPrompt()" class="bg-violet-600 hover:bg-violet-700 text-white px-6 py-2 rounded-lg transition hidden">
    Создать рецепт
</button>
<button id="add-pharmacy-btn" onclick="addPharmacyPrompt()" class="bg-cyan-600 hover:bg-cyan-700 text-white px-6 py-2 rounded-lg transition hidden">
    Добавить аптеку
</button>
<div id="prescriptions-container" class="mt-6 text-left hidden">
            <h2 class="text-xl font-bold mb-3 border-b border-slate-600 pb-2">Мои рецепты:</h2>
            <ul id="prescriptions-list" class="space-y-3 max-h-60 overflow-y-auto">
                <!-- Сюда с помощью JS будут добавляться рецепты -->
            </ul>
        </div>

<script>
    // Добавьте это в функцию getAdminPanelInfo() внутри if (response.ok)
    // Чтобы кнопка появлялась только у тех, у кого есть доступ к админ-панели/роли Доктора
    document.getElementById('add-med-btn').classList.remove('hidden');

    async function addMedicationPrompt() {
        const name = prompt("Введите название лекарства:");
        if (!name) return;

        const description = prompt("Введите описание:");
        const prescription = confirm("Требуется ли рецепт?");

        const token = localStorage.getItem('token');
        
        try {
            const response = await fetch('http://127.0.0.1:8000/home/add-medications', {
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}` 
                },
                body: JSON.stringify({
                    name: name,
                    description: description,
                    prescription: prescription // Убедитесь, что имя поля совпадает с вашей схемой
                })
            });

            if (response.ok) {
                alert("Лекарство успешно добавлено!");
            } else {
                const errorData = await response.json();
                alert("Ошибка: " + (errorData.detail || "Не удалось добавить"));
            }
        } catch (error) {
            console.error("Ошибка запроса:", error);
            alert("Ошибка соединения с сервером");
        }
    }
    // Показываем кнопку (логика как и для добавления лекарства)
document.getElementById('create-prescription-btn').classList.remove('hidden');

async function createPrescriptionPrompt() {
    // Сбор данных через prompt
    const patient_id = prompt("Введите ID пациента (число):");
    const pharmacy_id = prompt("Введите ID аптеки (число):");
    const medication_id = prompt("Введите ID лекарства (число):");
    const instruction = prompt("Инструкция (необязательно):");
    const quantity = prompt("Количество (число):");
    const end_date = prompt("Дата окончания (в формате ГГГГ-ММ-ДД ТТ:ММ):", "2024-12-31 23:59");

    // Проверка на отмену (если пользователь нажал "Отмена")
    if (!patient_id || !medication_id || !quantity || !end_date) {
        alert("Все поля, кроме инструкции, обязательны!");
        return;
    }

    const token = localStorage.getItem('token');
    
    try {
        const response = await fetch('http://127.0.0.1:8000/home/new_drug_prescription', {
            method: 'POST',
            headers: { 
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${token}` 
            },
            body: JSON.stringify({
                patient_id: parseInt(patient_id),
                pharmacy_id: parseInt(pharmacy_id),   // Как в твоем BaseModel
                medication_id: parseInt(medication_id),
                instruction: instruction || null,
                quantity: parseInt(quantity),       // Как в твоем BaseModel
                body: JSON.stringify({
    patient_id: parseInt(patient_id),
    pharmacy_id: parseInt(pharmacy_id),
    medication_id: parseInt(medication_id),
    instruction: instruction || null,
    quantity: parseInt(quantity),
    end_date: end_date.replace(' ', 'T') // Превращаем "2024-12-31 23:59" в формат ISO
}) // Превращаем строку в формат даты
            })
        });

        if (response.ok) {
            alert("Рецепт успешно создан!");
        } else {
            const errorData = await response.json();
            alert("Ошибка: " + JSON.stringify(errorData.detail));
        }
    } catch (error) {
        console.error("Ошибка запроса:", error);
        alert("Ошибка соединения с сервером");
    }
}
// Показываем кнопку только админам
document.getElementById('add-pharmacy-btn').classList.remove('hidden');

async function addPharmacyPrompt() {
    const name = prompt("Введите название аптеки:");
    if (!name) return;

    const address = prompt("Введите адрес аптеки:");
    if (!address) return;

    const token = localStorage.getItem('token');
    
    try {
        const response = await fetch('http://127.0.0.1:8000/home/new_pharmacies', {
            method: 'POST',
            headers: { 
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${token}` 
            },
            body: JSON.stringify({
                name: name,
                address: address
            })
        });

        if (response.ok) {
            alert("Аптека успешно добавлена!");
        } else {
            const errorData = await response.json();
            // Проверяем detail, так как FastAPI ошибки обычно там
            alert("Ошибка: " + (errorData.detail || "Доступ запрещен"));
        }
    } catch (error) {
        console.error("Ошибка запроса:", error);
        alert("Ошибка соединения с сервером");
    }
}
async function getMyPrescriptions() {
    const token = localStorage.getItem('token');
    
    if (!token) {
        alert("Пожалуйста, авторизуйтесь");
        return;
    }

    try {
        // Делаем GET-запрос на специальный эндпоинт
        const response = await fetch('http://127.0.0.1:8000/home/my_prescriptions', {
            method: 'GET',
            headers: { 
                'Authorization': `Bearer ${token}` 
            }
        });

        if (response.ok) {
            const prescriptions = await response.json();
            const listContainer = document.getElementById('prescriptions-list');
            listContainer.innerHTML = ''; // Очищаем список перед новым рендером

            if (prescriptions.length === 0) {
                listContainer.innerHTML = '<li class="text-slate-400 text-center">У вас нет активных рецептов</li>';
            } else {
                prescriptions.forEach(p => {
                    // Форматируем дату красиво
                    const endDate = p.end_date ? new Date(p.end_date).toLocaleDateString('ru-RU') : 'Бессрочно';
                    
                    // Создаем карточку рецепта
                    listContainer.innerHTML += `
                        <li class="bg-slate-700 p-3 rounded-lg text-sm shadow">
                            <p class="text-lg text-green-400 font-bold">${p.medication_name} <span class="text-white text-sm font-normal">(Кол-во: ${p.quantity})</span></p>
                            <p class="text-slate-300 mt-1"><span class="font-bold">Аптека:</span> ${p.pharmacy_name}</p>
                            ${p.instruction ? `<p class="text-slate-400 italic mt-1">Инструкция: ${p.instruction}</p>` : ''}
                            <p class="text-red-400 mt-2 font-bold">Действителен до: ${endDate}</p>
                        </li>
                    `;
                });
            }
            
            // Показываем контейнер
            document.getElementById('prescriptions-container').classList.remove('hidden');
        } else {
            const errorData = await response.json();
            alert("Ошибка: " + (errorData.detail || "Не удалось загрузить рецепты"));
        }
    } catch (error) {
        console.error("Ошибка запроса:", error);
        alert("Ошибка соединения с сервером");
    }
}
</script>

        </div>
    </div>
</body>
</html>
