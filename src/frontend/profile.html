<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Личный кабинет</title>
    <script src="../static/js/profile.js"></script>
	<link rel="Stylesheet" href="../static/css/index.css"></link>
</head>
<body>
    <div class="container">
        <h1>Добро пожаловать!</h1>
        <p>Это твой защищенный профиль.</p>
        
        <div id="user-info">
            <p>Твой ID: <span id="user-id" class="text-blue-400"></span></p>
            <p>Логин: <span id="user-name" class="text-blue-400"></span></p>
            <p id="role-container" hidden>Роль: <span id="user-role"></span></p>
        </div>

        <div style="display: grid; justify-items: center; gap: 10px; padding-top: 1vh;">
            <button onclick="getAdminPanelInfo()">Админ панель</button>

            <button id="change-role-btn" onclick="changeRolePrompt()">Изменить роль пользователя </button>

            <button onclick="logout()">Выйти из системы</button>
        </div>
    </div>
</body>
</html>
