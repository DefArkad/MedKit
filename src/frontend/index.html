<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Моя Аутентификация</title>
    <script defer src="../static/js/index.js"></script>
	<link rel="Stylesheet" href="../static/css/index.css"></link>
</head>
<body>
    <div class="container" style="display:grid; justify-items: center; grid-column: 1; grid-row: 1; width: 20vw;">
        <h2 class="UI">Вход</h2>
        
        <form id="auth-form" style="display: grid; justify-items: center; gap: 10px;">
            <input type="text" id="username" placeholder="Имя пользователя" required>
            <input type="password" id="password" placeholder="Пароль" required>
            <button type="submit">Отправить</button>
        </form>

        <div style="padding-top: 4vh; display: grid; justify-items: center;">
            <button style="width: 65%" id="toggle-mode">Нет аккаунта? Зарегистрироваться</button>
        </div>
        <div id="status"></div>
    </div>
</body>
</html>
